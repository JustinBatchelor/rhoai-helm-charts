{{- $dwName := include "ai-workspace.devworkspaceName" . -}}
{{- $continueConfigName := include "ai-workspace.continueConfigName" . -}}
kind: DevWorkspace
apiVersion: workspace.devfile.io/v1alpha2
metadata:
  name: {{ $dwName }}
  namespace: {{ .Values.devspacesNamespace }}
  labels:
    {{- include "ai-workspace.labels" . | nindent 4 }}
spec:
  routingClass: che
  started: true
  contributions:
    - name: ide
      uri: {{ .Values.devspaces.editorContributionUri }}
  template:
    attributes:
      controller.devfile.io/storage-type: per-user
      {{- if .Values.continuedev.enabled }}
      pod-overrides:
        spec:
          volumes:
          - name: continue-config
            configMap:
              name: {{ $continueConfigName }}
              defaultMode: 420
      {{- end }}
    {{- if .Values.continuedev.enabled }}
    commands:
      - id: setup-continue-config
        exec:
          component: tools
          commandLine: |
            mkdir -p /home/user/.continue && cp /tmp/continue-config/config.yaml /home/user/.continue/config.yaml
    events:
      postStart:
        - setup-continue-config
    {{- end }}
    projects:
      - name: project
        git:
          remotes:
            origin: {{ .Values.gitRepo | quote }}
          checkoutFrom:
            revision: {{ .Values.gitBranch | quote }}
    components:
      - name: tools
        {{- if .Values.continuedev.enabled }}
        attributes:
          container-overrides:
            volumeMounts:
            - name: continue-config
              mountPath: /tmp/continue-config/config.yaml
              subPath: config.yaml
              readOnly: true
        {{- end }}
        container:
          image: {{ .Values.devspaces.image }}
          memoryRequest: {{ .Values.devspaces.resources.requests.memory }}
          memoryLimit: {{ .Values.devspaces.resources.limits.memory }}
          cpuRequest: {{ .Values.devspaces.resources.requests.cpu | quote }}
          cpuLimit: {{ .Values.devspaces.resources.limits.cpu | quote }}
          mountSources: true
          sourceMapping: /projects
          env:
            - name: CHE_DASHBOARD_URL
              value: {{ .Values.devspaces.dashboardUrl }}
            - name: MODEL_ENDPOINT
              value: "http://{{ .Values.aiModel.name }}-predictor.{{ .Values.username }}-ai-ws.svc.cluster.local:8080"
            - name: MODEL_NAME
              value: {{ .Values.aiModel.name | quote }}
